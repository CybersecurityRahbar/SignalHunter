workflows:
  android-workflow:
    name: SignalHunter Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: "com.example.signalhunter"
    scripts:
      - name: 🔍 1. فحص هيكل المجلدات
        script: |
          echo "=== محتويات الجذر ==="
          ls -la
          echo "=== محتويات مجلد التطبيق ==="
          ls -la app/
          echo "=== محتويات مجلد C++ ==="
          ls -la app/src/main/cpp/
      - name: 🔍 2. فحص صلاحيات ملف Gradle
        script: |
          chmod +x ./gradlew
          echo "تم منح الصلاحية لـ gradlew"
      - name: 🔍 3. محاولة قراءة مهام Gradle (هنا سيظهر الخطأ الحقيقي)
        script: |
          ./gradlew tasks --no-daemon --stacktrace || exit 1
      - name: 🏗️ 4. بناء التطبيق
        script: |
          ./gradlew assembleRelease --stacktrace
    artifacts:
      - app/build/outputs/**/*.apk
