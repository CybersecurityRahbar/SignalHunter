workflows:
  android-workflow:
    name: SignalHunter Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: "com.example.signalhunter"
    scripts:
      - name: منح الصلاحيات
        script: |
          chmod +x ./gradlew
      - name: بناء التطبيق (نسخة Debug موقّعة تلقائياً)
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
