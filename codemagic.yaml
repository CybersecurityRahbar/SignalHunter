workflows:
  android-workflow:
    name: SignalHunter Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.example.signalhunter"
      # تم حذف سطر "sdk: latest" لأنه غير معترف به هنا
    scripts:
      - name: Set up Android SDK
        script: |
          echo "sdk.dir=$HOME/programs/android-sdk-macosx" > local.properties
      - name: Build Release APK
        script: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your_email@example.com  # غير هذا إلى بريدك الإلكتروني
